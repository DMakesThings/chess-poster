<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sicilian Dragon Poster</title>

  <!-- html2canvas for PNG export -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --paper:#efe2c4;
      --ink:#1f3b2e;
      --frame:#5a3d2b;

      /* Swapped colors */
      --light:#b7773a;
      --dark:#f3d6a7;

      --shadow: 0 18px 40px rgba(0,0,0,.18);
      --focus: 0 0 0 3px rgba(41,156,255,.35);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(circle at 30% 20%, #f6edd7, #e8d7b9 45%, #d8c29d);
      font-family: Georgia, "Times New Roman", serif;
      color:var(--ink);
    }

    .poster{
      width:min(900px, 94vw);
      background: linear-gradient(180deg, #f2e7cf, var(--paper) 28%, #ead7b5);
      border:10px solid rgba(90,61,43,.25);
      border-radius:12px;
      box-shadow:var(--shadow);
      padding:32px;
      position:relative;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom:14px;
      font-family: system-ui, sans-serif;
    }

    .toolbar input{
      padding:8px 10px;
      border-radius:8px;
      border:1px solid #999;
      width:min(560px, 85vw);
    }

    .toolbar button{
      padding:8px 14px;
      border-radius:8px;
      border:1px solid #777;
      font-weight:600;
      cursor:pointer;
    }

    .editable{
      outline:none;
      border-radius:8px;
      padding:6px 10px;
    }

    .editable:focus{
      box-shadow:var(--focus);
      background:rgba(255,255,255,.25);
    }

    .title{
      text-align:center;
      font-size:clamp(36px,5vw,68px);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:16px;
    }

    .board-wrap{
      display:grid;
      place-items:center;
      margin:14px 0;
    }

    .frame{
      padding:14px;
      background:linear-gradient(180deg,#5a3d2b,#7a573f);
      border-radius:10px;
    }

    .board{
      width:min(560px,82vw);
      aspect-ratio:1/1;
      display:grid;
      grid-template-columns:repeat(8,1fr);
      grid-template-rows:repeat(8,1fr);
      border:3px solid rgba(0,0,0,.3);
      position:relative;
    }

    .sq{
      display:grid;
      place-items:center;
      font-size:clamp(30px,4.6vw,52px);
      line-height:1;
      user-select:none;
      font-family:"Segoe UI Symbol","Noto Sans Symbols2",sans-serif;
      text-shadow:0 1px 0 rgba(0,0,0,0.08);
    }

    .light{ background:var(--light); }
    .dark{ background:var(--dark); }

    .coord-file, .coord-rank{
      position:absolute;
      pointer-events:none;
      font-size:12px;
      opacity:.8;
    }

    .coord-file{
      bottom:4px;
      left:0;
      width:100%;
      display:grid;
      grid-template-columns:repeat(8,1fr);
      text-align:center;
    }

    .coord-rank{
      top:0;
      left:4px;
      height:100%;
      display:grid;
      grid-template-rows:repeat(8,1fr);
      align-items:center;
    }

    .moves{
      text-align:center;
      font-size:clamp(18px,2.6vw,30px);
      font-weight:700;
      white-space:pre-wrap;
      margin-top:12px;
    }

    .hint{
      text-align:center;
      font-size:12px;
      opacity:.7;
      margin-top:10px;
      font-family: system-ui, sans-serif;
    }

    @media print{
      .toolbar,.hint{ display:none; }
    }
  </style>
</head>
<body>

<div class="poster" id="poster">
  <div class="toolbar">
    <input id="fenInput" />
    <button onclick="applyFen()">Apply FEN</button>
    <button onclick="exportPGN()">Export PGN</button>
    <button onclick="exportPNG()">Export PNG</button>
  </div>

  <div id="title" class="title editable" contenteditable="true">
    Sicilian Dragon
  </div>

  <div class="board-wrap">
    <div class="frame">
      <div id="board" class="board"></div>
    </div>
  </div>

  <div id="moves" class="moves editable" contenteditable="true">
1. e4 c5 2. Nf3 d6
3. d4 cxd4 4. Nxd4 Nf6
5. Nc3 g6
  </div>

  <div class="hint">
    Click title or moves to edit • Export PGN or PNG
  </div>
</div>

<script>
  const DEFAULT_FEN =
    "rnbqkb1r/pp2ppbp/3p1np1/8/3NP3/2N5/PPP2PPP/R1BQKB1R w KQkq - 0 6";

  const PIECES = {
    p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚",
    P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔"
  };

  const fenInput = document.getElementById("fenInput");
  fenInput.value = DEFAULT_FEN;

  function parseFEN(fen){
    return fen.split(" ")[0].split("/").map(r =>
      r.replace(/\d/g, d => " ".repeat(d)).split("")
    );
  }

  function renderBoard(fen){
    const board = document.getElementById("board");
    board.innerHTML = "";
    const rows = parseFEN(fen);

    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        const sq = document.createElement("div");
        sq.className = "sq " + ((r+c)%2===0 ? "dark" : "light");
        const p = rows[r][c];
        sq.textContent = PIECES[p] || "";
        board.appendChild(sq);
      }
    }

    const files = document.createElement("div");
    files.className="coord-file";
    "abcdefgh".split("").forEach(f=>{
      const s=document.createElement("span"); s.textContent=f; files.appendChild(s);
    });
    board.appendChild(files);

    const ranks = document.createElement("div");
    ranks.className="coord-rank";
    for(let i=8;i>=1;i--){
      const s=document.createElement("span"); s.textContent=i; ranks.appendChild(s);
    }
    board.appendChild(ranks);
  }

  function applyFen(){
    renderBoard(fenInput.value);
  }

  function exportPGN(){
    const title = document.getElementById("title").innerText.trim();
    const moves = document.getElementById("moves").innerText.trim();
    const fen = fenInput.value.trim();

    const pgn =
`[Event "${title}"]
[Site "?"]
[Date "????.??.??"]
[Round "?"]
[White "?"]
[Black "?"]
[Result "*"]
[SetUp "1"]
[FEN "${fen}"]

${moves} *`;

    const blob = new Blob([pgn], {type:"application/vnd.chess-pgn"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = title.replace(/\W+/g,"-").toLowerCase()+".pgn";
    a.click();
  }

  async function exportPNG(){
    const toolbar = document.querySelector(".toolbar");
    const hint = document.querySelector(".hint");
    toolbar.style.display = "none";
    hint.style.display = "none";

    const canvas = await html2canvas(document.getElementById("poster"), {
      scale: window.devicePixelRatio || 2
    });

    toolbar.style.display = "";
    hint.style.display = "";

    const link = document.createElement("a");
    link.download = document.getElementById("title").innerText
      .replace(/\W+/g,"-").toLowerCase()+".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  }

  renderBoard(DEFAULT_FEN);
</script>

</body>
</html>
